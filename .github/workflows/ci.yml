name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
  NEXT_PUBLIC_SOLANA_RPC_URL: https://placeholder.helius-rpc.com
  SUPABASE_SERVICE_ROLE_KEY: placeholder

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm audit --audit-level=critical
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run test:unit
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    # Dependabot PRs can't access repo secrets — skip e2e for them.
    # TODO: add NEXT_PUBLIC_SUPABASE_URL / _ANON_KEY / _SOLANA_RPC_URL as repo
    # secrets and inject via `env:` here so e2e tests against real Supabase
    # on human PRs instead of the placeholder values above (which cause any
    # Supabase-touching spec to fail with 500).
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 1
